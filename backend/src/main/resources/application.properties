# ============================
# Common application settings
# ============================
spring.application.name=todolist

# Active profile (overridden by SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================
# Datasource (PostgreSQL)
# ============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:todo_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================
# JPA / Hibernate
# ============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================
# Jackson
# ============================
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================
# Server
# ============================
# Render (and most PaaS) assign the listen port via the PORT env var; SERVER_PORT
# stays as a manual override for environments where you want to pick your own.
server.port=${PORT:${SERVER_PORT:8080}}

# ============================
# Swagger / OpenAPI
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================
# CORS
# ============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ============================
# JWT
# ============================
app.jwt.secret=${JWT_SECRET:dev-only-secret-key-please-change-in-production-01234567890123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================
# Default seeded leader account (created on first startup if no users exist)
# ============================
app.seed.leader-username=${SEED_LEADER_USERNAME:leader}
app.seed.leader-password=${SEED_LEADER_PASSWORD:leader123}
app.seed.leader-fullname=${SEED_LEADER_FULLNAME:Truong nhom}
